services:
  - type: web
    name: eaty-backend
    env: node
    region: virginia
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: eaty-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false

databases:
  - name: eaty-db
    databaseName: eaty
    plan: free
    region: virginia
    postgresMajorVersion: "15"
