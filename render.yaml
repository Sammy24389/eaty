services:
  - type: web
    name: eaty
    env: node
    region: virginia
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        fromService:
          name: eaty
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: DATABASE_URL
        fromDatabase:
          name: eaty-db
          property: connectionString
      - key: NEXT_PUBLIC_URL
        fromService:
          name: eaty
          type: web
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: eaty-db
    databaseName: eaty
    plan: free
    region: virginia
    postgresMajorVersion: "15"
